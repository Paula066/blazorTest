name: Build and Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and publish
        run: dotnet publish -c Release -o output

      - name: Prepare Vercel Build Output API
        run: |
          mkdir -p output/wwwroot/.vercel/output/static
          cp -R output/wwwroot/_framework output/wwwroot/.vercel/output/static/
          cp -R output/wwwroot/css output/wwwroot/.vercel/output/static/
          cp -R output/wwwroot/sample-data output/wwwroot/.vercel/output/static/
          cp output/wwwroot/index.html output/wwwroot/.vercel/output/static/
          cp output/wwwroot/favicon.png output/wwwroot/.vercel/output/static/
          cp output/wwwroot/icon-192.png output/wwwroot/.vercel/output/static/
          cp output/wwwroot/ElevatoBlazorApp.styles.css output/wwwroot/.vercel/output/static/
          cat > output/wwwroot/.vercel/output/config.json << 'CONF'
          {
            "version": 3,
            "routes": [
              {
                "src": "^/_framework/(.*)$",
                "headers": { "Cache-Control": "public, max-age=31536000, immutable" },
                "continue": true
              },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          CONF

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        id: vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./output/wwwroot
          vercel-args: '--prebuilt --prod'

      - name: Show deployment URL
        run: echo "Deployed to ${{ steps.vercel-deploy.outputs.preview-url }}"
